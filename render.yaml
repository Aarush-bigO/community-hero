services:
  - type: web
    name: community-hero-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LLM_PROVIDER
        value: mock
      - key: CORS_ORIGIN
        value: "*"
      - key: PULSE_LIVE
        value: "true"
      - key: PULSE_INTERVAL_MS
        value: "15000"
    autoDeploy: true
